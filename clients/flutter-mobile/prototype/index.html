<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fabrika Gym — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
:root{
  --black:#000;
  --bg:#0A0A0A;
  --s1:#111;
  --s2:#181818;
  --s3:#222;
  --s4:#2A2A2A;
  --b1:rgba(255,255,255,0.06);
  --b2:rgba(255,255,255,0.10);
  --b3:rgba(255,255,255,0.18);
  --w:#fff;
  --g1:rgba(255,255,255,0.85);
  --g2:rgba(255,255,255,0.50);
  --g3:rgba(255,255,255,0.28);
  --g4:rgba(255,255,255,0.12);
  --red:#FF4444;
  --green:#3DCC7A;
  --amber:#F5A623;
}
.light{
  --black:#fff;
  --bg:#F5F5F7;
  --s1:#fff;
  --s2:#F0F0F2;
  --s3:#E8E8EB;
  --s4:#DDDDE0;
  --b1:rgba(0,0,0,0.07);
  --b2:rgba(0,0,0,0.11);
  --b3:rgba(0,0,0,0.18);
  --w:#0A0A0A;
  --g1:rgba(0,0,0,0.80);
  --g2:rgba(0,0,0,0.45);
  --g3:rgba(0,0,0,0.25);
  --g4:rgba(0,0,0,0.10);
  --red:#D92B2B;
  --green:#1E9E52;
  --amber:#C47D0A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',system-ui,sans-serif;background:#050505;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 12px 64px;}

.pg-hd{text-align:center;margin-bottom:32px;}
.pg-hd h1{font-size:10px;font-weight:600;letter-spacing:5px;color:var(--g3);margin-bottom:10px;}
.pg-hd h2{font-size:26px;font-weight:700;color:var(--w);letter-spacing:-0.5px;}
.pg-hd p{font-size:12px;color:var(--g2);margin-top:5px;}

.role-bar{display:flex;background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:5px;margin-bottom:32px;gap:4px;}
.rb{padding:8px 20px;border-radius:10px;font-size:12px;font-weight:600;letter-spacing:0.3px;cursor:pointer;border:none;background:none;color:var(--g3);transition:all .2s;font-family:inherit;}
.rb.on{background:var(--w);color:var(--black);}

.wrap{display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
.col{display:flex;flex-direction:column;align-items:center;gap:12px;}
.plat{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--g3);}

.phone{width:375px;height:812px;position:relative;overflow:hidden;flex-shrink:0;}
.phone.ios{background:#0A0A0A;border-radius:52px;box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 0 0 3px rgba(255,255,255,0.02),0 0 80px rgba(0,0,0,0.8),0 40px 120px rgba(0,0,0,0.6);}
.phone.and{background:#080808;border-radius:42px;box-shadow:0 0 0 1px rgba(255,255,255,0.05),0 0 0 3px rgba(255,255,255,0.015),0 0 80px rgba(0,0,0,0.8),0 40px 120px rgba(0,0,0,0.6);}
.hw{position:absolute;border-radius:2.5px;background:rgba(255,255,255,0.07);}
.ios .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:116px;height:32px;background:#0A0A0A;border-radius:0 0 18px 18px;z-index:99;}
.and .punch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:#080808;border-radius:50%;z-index:99;}
.sw{position:absolute;inset:0;border-radius:inherit;overflow:hidden;}
.root{position:relative;width:100%;height:100%;overflow:hidden;background:var(--bg);}

.view{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .25s;will-change:transform,opacity;}
.view.r{transform:translateX(100%);opacity:0;pointer-events:none;}
.view.l{transform:translateX(-18px);opacity:0;pointer-events:none;}

/* STATUS BAR */
.ios-sb{height:44px;display:flex;align-items:flex-end;padding:0 22px 7px;flex-shrink:0;}
.and-sb{height:26px;display:flex;align-items:center;padding:0 16px;flex-shrink:0;}
.sb-time{font-size:15px;font-weight:600;color:var(--w);}
.sb-icons{margin-left:auto;display:flex;gap:5px;align-items:center;color:var(--w);}
.sb-icons i,.and-sb-icons i{font-size:13px;}
.and-sb-time{font-size:11px;font-weight:500;color:var(--w);}
.and-sb-icons{margin-left:auto;display:flex;gap:4px;color:var(--w);}

/* NAV */
.bnav{display:flex;padding:9px 0 22px;background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0;}
.bnav.dark{background:var(--black);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 0;font-family:inherit;}
.nb i{font-size:21px;color:var(--g3);}
.nb span{font-size:9.5px;font-weight:600;color:var(--g3);letter-spacing:0.2px;}
.nb.on i,.nb.on span{color:var(--w);}
.ag{height:22px;display:flex;align-items:center;justify-content:center;background:var(--s1);flex-shrink:0;}
.ag.dark{background:var(--black);}
.ag div{width:100px;height:3px;background:var(--b2);border-radius:3px;}

/* SCROLL */
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sc::-webkit-scrollbar{display:none;}
.p{padding:16px 18px;}

/* TOPBAR */
.tb{padding:14px 18px 12px;flex-shrink:0;}
.tb-t{font-size:22px;font-weight:700;color:var(--w);letter-spacing:-0.4px;}
.tb-s{font-size:12px;color:var(--g2);margin-top:2px;}

/* CARDS */
.card{background:var(--s2);border:1px solid var(--b1);border-radius:18px;overflow:hidden;}
.cp{padding:16px 18px;}

/* SECTION LABEL */
.sl{font-size:10px;font-weight:700;letter-spacing:1.8px;color:var(--g3);margin:18px 0 8px;}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.sk{background:var(--s2);border:1px solid var(--b1);border-radius:16px;padding:14px;}
.sk-v{font-size:22px;font-weight:700;color:var(--w);letter-spacing:-0.4px;margin-top:10px;}
.sk-l{font-size:10px;color:var(--g2);margin-top:2px;}
.sk-b{font-size:10px;font-weight:600;margin-top:7px;}
.sk-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--s3);}
.sk-ic i{font-size:15px;color:var(--g2);}

/* DIVIDER ROWS */
.dr{display:flex;align-items:center;gap:11px;padding:13px 18px;cursor:pointer;}
.dr+.dr{border-top:1px solid var(--b1);}
.dr-ic{width:34px;height:34px;border-radius:10px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dr-ic i{font-size:16px;color:var(--g2);}
.dr-t{font-size:14px;font-weight:500;color:var(--w);}
.dr-s{font-size:11px;color:var(--g2);margin-top:1px;}
.dr-ch{margin-left:auto;color:var(--g3);}
.dr-ch i{font-size:15px;}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.badge.white{background:var(--w);color:var(--black);}
.badge.muted{background:var(--s3);color:var(--g2);border:1px solid var(--b2);}
.badge.ok{background:rgba(61,204,122,0.12);color:#3DCC7A;border:1px solid rgba(61,204,122,0.2);}
.badge.warn{background:rgba(245,166,35,0.12);color:#F5A623;border:1px solid rgba(245,166,35,0.2);}
.badge.err{background:rgba(255,68,68,0.12);color:#FF6B6B;border:1px solid rgba(255,68,68,0.2);}

/* LESSON ROW */
.lr{display:flex;align-items:center;gap:10px;padding:13px 0;cursor:pointer;}
.lr+.lr{border-top:1px solid var(--b1);}
.lr-bar{width:2px;height:36px;border-radius:2px;background:var(--g3);flex-shrink:0;}
.lr-n{font-size:14px;font-weight:600;color:var(--w);}
.lr-m{font-size:11px;color:var(--g2);margin-top:2px;}
.lr-t{margin-left:auto;font-size:14px;font-weight:700;color:var(--g1);}

/* LESSON CARD */
.lc{background:var(--s2);border:1px solid var(--b1);border-radius:16px;margin-bottom:9px;cursor:pointer;position:relative;overflow:hidden;}
.lc-bar{position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--g3);}
.lc-in{padding:14px 14px 14px 18px;}
.lc-t{font-size:14px;font-weight:700;color:var(--w);}
.lc-s{font-size:11px;color:var(--g2);margin-top:2px;}
.lc-r{display:flex;gap:5px;margin-top:10px;align-items:center;flex-wrap:wrap;}
.lc-time{font-size:15px;font-weight:700;color:var(--w);margin-left:auto;}

/* DATE STRIP */
.ds{display:flex;gap:5px;padding:10px 18px;overflow-x:auto;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--b1);}
.ds::-webkit-scrollbar{display:none;}
.dp{display:flex;flex-direction:column;align-items:center;padding:8px 10px;border-radius:12px;min-width:44px;cursor:pointer;border:1px solid transparent;}
.dp.on{background:var(--w);border-color:var(--w);}
.dp .dn{font-size:16px;font-weight:700;color:var(--g2);}
.dp .dd{font-size:9px;font-weight:600;color:var(--g3);}
.dp.on .dn{color:var(--black);}
.dp.on .dd{color:rgba(0,0,0,0.5);}

/* MEMBER ROW */
.mr{display:flex;align-items:center;gap:11px;padding:12px 18px;cursor:pointer;}
.mr+.mr{border-top:1px solid var(--b1);}
.mav{width:36px;height:36px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g1);border:1px solid var(--b2);flex-shrink:0;}
.mn{font-size:14px;font-weight:500;color:var(--w);}
.ms{font-size:11px;color:var(--g2);margin-top:1px;}

/* PROFILE */
.ph{background:var(--s1);padding:24px 18px 26px;flex-shrink:0;border-bottom:1px solid var(--b1);}
.pav{width:68px;height:68px;border-radius:50%;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--w);margin-bottom:10px;}
.pname{font-size:18px;font-weight:700;color:var(--w);}
.pemail{font-size:12px;color:var(--g2);margin-top:2px;}
.pst{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--b1);border-radius:14px;margin-top:18px;overflow:hidden;}
.psi{padding:12px 0;text-align:center;}
.psi+.psi{border-left:1px solid var(--b1);}
.psi-v{font-size:18px;font-weight:700;color:var(--w);}
.psi-l{font-size:9.5px;color:var(--g3);margin-top:2px;}

/* QR */
.qr-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.qr-box{width:188px;height:188px;background:var(--w);border-radius:20px;display:flex;align-items:center;justify-content:center;position:relative;}
.qrc{position:absolute;width:22px;height:22px;}
.qrc.tl{top:11px;left:11px;border-top:2.5px solid var(--black);border-left:2.5px solid var(--black);border-radius:3px 0 0 0;}
.qrc.tr{top:11px;right:11px;border-top:2.5px solid var(--black);border-right:2.5px solid var(--black);border-radius:0 3px 0 0;}
.qrc.bl{bottom:11px;left:11px;border-bottom:2.5px solid var(--black);border-left:2.5px solid var(--black);border-radius:0 0 0 3px;}
.qrc.br{bottom:11px;right:11px;border-bottom:2.5px solid var(--black);border-right:2.5px solid var(--black);border-radius:0 0 3px 0;}

/* LOGIN */
.login-root{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.brand{text-align:center;margin-bottom:28px;}
.brand-icon{width:60px;height:60px;border-radius:18px;background:var(--s2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.brand-icon i{font-size:28px;color:var(--w);}
.brand-name{font-size:17px;font-weight:700;letter-spacing:5px;color:var(--w);}
.brand-sub{font-size:9px;letter-spacing:3px;color:var(--g3);margin-top:4px;}
.lcard{background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:22px;width:100%;}
.lcard h3{font-size:17px;font-weight:700;color:var(--w);margin-bottom:2px;}
.lcard p{font-size:12px;color:var(--g2);margin-bottom:18px;}
.field{background:var(--s3);border:1px solid var(--b1);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.field i{font-size:16px;color:var(--g3);}
.field input{background:none;border:none;outline:none;color:var(--w);font-size:14px;flex:1;font-family:inherit;}
.field input::placeholder{color:var(--g3);}
.role-pick{display:flex;flex-direction:column;gap:6px;margin:4px 0 14px;}
.rp{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:11px;cursor:pointer;border:1px solid var(--b1);background:var(--s3);transition:all .15s;}
.rp.sel{background:var(--w);border-color:var(--w);}
.rp-dot{width:6px;height:6px;border-radius:50%;background:var(--g3);flex-shrink:0;}
.rp.sel .rp-dot{background:var(--black);}
.rp-lbl{font-size:12px;font-weight:600;color:var(--g2);}
.rp.sel .rp-lbl{color:var(--black);}
.rp-sub{font-size:10px;color:var(--g3);margin-left:auto;}
.rp.sel .rp-sub{color:rgba(0,0,0,0.5);}
.cta{width:100%;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;letter-spacing:0.5px;cursor:pointer;font-family:inherit;background:var(--w);color:var(--black);transition:opacity .15s;}
.cta:active{opacity:.85;}
.dev{font-size:11px;color:var(--g3);text-align:center;margin-top:8px;cursor:pointer;}

/* DETAIL */
.dh{padding:16px 18px 20px;flex-shrink:0;background:var(--bg);}
.back{display:flex;align-items:center;gap:5px;color:var(--g2);font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;margin-bottom:14px;padding:0;font-family:inherit;}
.d-t{font-size:21px;font-weight:700;color:var(--w);letter-spacing:-0.3px;}
.d-s{font-size:12px;color:var(--g2);margin-top:4px;}
.d-b{display:flex;gap:5px;margin-top:12px;}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.ic{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:14px;}
.ic-v{font-size:15px;font-weight:700;color:var(--w);margin-top:6px;}
.ic-l{font-size:10px;color:var(--g3);margin-top:2px;}

/* MEMBERSHIP CARD */
.mem-card{background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:20px;position:relative;overflow:hidden;margin-bottom:14px;}
.mem-card::before{content:'';position:absolute;top:-60px;right:-60px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.02);}
.mem-ttl{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--g3);margin-bottom:10px;}
.mem-name{font-size:17px;font-weight:700;color:var(--w);}
.mem-sub{font-size:11px;color:var(--g2);margin-top:3px;}
.mem-badge{position:absolute;top:16px;right:16px;padding:3px 10px;border-radius:20px;background:var(--s3);border:1px solid var(--b2);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--g1);}
.prog{height:3px;background:var(--b2);border-radius:3px;margin-top:18px;}
.prog-f{height:3px;border-radius:3px;background:var(--w);}
.prog-d{font-size:9px;color:var(--g3);margin-top:5px;}

/* TRAINER SCHEDULE */
.ts{background:var(--s2);border:1px solid var(--b1);border-radius:16px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.ts-t{font-size:13px;font-weight:700;color:var(--w);min-width:44px;}
.ts-div{width:1px;height:36px;background:var(--b2);flex-shrink:0;}
.ts-n{font-size:13px;font-weight:600;color:var(--w);}
.ts-m{font-size:10px;color:var(--g2);margin-top:2px;}
.ts-cap{margin-left:auto;font-size:12px;font-weight:600;color:var(--g2);}

/* CAPACITY BAR */
.cap-bar{height:3px;background:var(--b2);border-radius:3px;margin-top:6px;width:70px;}
.cap-f{height:3px;border-radius:3px;}

/* ADMIN ACTIVITY */
.act-row{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;}
.act-row+.act-row{border-top:1px solid var(--b1);}
.act-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.act-t{font-size:13px;color:var(--g1);flex:1;}
.act-s{font-size:11px;color:var(--g2);}

/* FINANCE */
.fin-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--b1);}
.fin-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:10px;}
.fin-name{font-size:13px;color:var(--w);flex:1;}
.fin-val{font-size:13px;font-weight:700;color:var(--w);margin-right:12px;}
.fin-pct{font-size:11px;color:var(--g2);min-width:28px;text-align:right;}

/* BTN */
.pbtn{width:100%;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;letter-spacing:0.4px;cursor:pointer;font-family:inherit;background:var(--w);color:var(--black);}

/* TOAST */
.toast{position:absolute;bottom:86px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(20,20,20,0.96);border:1px solid var(--b2);color:var(--w);font-size:12px;font-weight:500;padding:9px 18px;border-radius:28px;opacity:0;transition:all .25s;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SEARCH BAR */
.search{display:flex;align-items:center;gap:8px;background:var(--s3);border:1px solid var(--b1);border-radius:11px;padding:9px 13px;margin:0 18px 12px;}
.search i{font-size:15px;color:var(--g3);}
.search span{font-size:12px;color:var(--g3);}
</style>
</head>
<body>

<div class="pg-hd">
  <h1>FABRIKA GYM</h1>
  <h2>UI Prototype — v0.3</h2>
  <p>Monokrom premium · 3 kullanıcı rolü · iOS & Android</p>
</div>

<div class="role-bar">
  <button class="rb on" id="rb-admin" onclick="setRole('admin')">Admin</button>
  <button class="rb" id="rb-trainer" onclick="setRole('trainer')">Antrenör</button>
  <button class="rb" id="rb-member" onclick="setRole('member')">Üye</button>
</div>

<div class="wrap">
  <div class="col">
    <div class="plat">iOS</div>
    <div class="phone ios">
      <div class="hw" style="left:-2px;top:140px;width:3px;height:28px;"></div>
      <div class="hw" style="left:-2px;top:180px;width:3px;height:28px;"></div>
      <div class="hw" style="left:-2px;top:105px;width:3px;height:22px;"></div>
      <div class="hw" style="right:-2px;top:158px;width:3px;height:58px;"></div>
      <div class="notch"></div>
      <div class="sw"><div class="root" id="I"></div></div>
    </div>
  </div>
  <div class="col">
    <div class="plat">Android</div>
    <div class="phone and">
      <div class="hw" style="right:-2px;top:158px;width:3px;height:65px;"></div>
      <div class="hw" style="right:-2px;top:240px;width:3px;height:42px;"></div>
      <div class="punch"></div>
      <div class="sw"><div class="root" id="A"></div></div>
    </div>
  </div>
</div>

<script>
const ROLES={
  admin:{
    label:'Admin',sub:'Yönetici paneli',
    tabs:[
      {id:'dash',ic:'ti-layout-dashboard',lbl:'Pano'},
      {id:'members',ic:'ti-users',lbl:'Üyeler'},
      {id:'trainers',ic:'ti-barbell',lbl:'Antrenörler'},
      {id:'finance',ic:'ti-chart-bar',lbl:'Finans'},
    ]
  },
  trainer:{
    label:'Antrenör',sub:'Antrenör paneli',
    tabs:[
      {id:'schedule',ic:'ti-calendar',lbl:'Program'},
      {id:'mymembers',ic:'ti-users',lbl:'Üyelerim'},
      {id:'tdiet',ic:'ti-salad',lbl:'Diyet'},
      {id:'checkin',ic:'ti-scan',lbl:'Yoklama'},
      {id:'tprofile',ic:'ti-user',lbl:'Profil'},
    ]
  },
  member:{
    label:'Üye',sub:'Üye uygulaması',

    waterNotif=!waterNotif;
    const tog=document.getElementById(`${P}-water-notif`);
    const thumb=document.getElementById(`${P}-notif-thumb`);
    if(waterNotif){
      tog.style.background='var(--w)';
      thumb.style.transform='translateX(0)';
      thumb.style.background='var(--black)';
      thumb.style.right='2px'; thumb.style.left='auto';
    } else {
      tog.style.background='var(--s4)';
      thumb.style.right='auto'; thumb.style.left='2px';
      thumb.style.background='var(--g2)';
    }
  };

  // egzersiz state: none → active → done → none
  const exState={};
  W[`${P}_cycleEx`]=function(si,ei){
    const key=`${si}-${ei}`;
    const cur=exState[key]||'none';
    const next=cur==='none'?'active':cur==='active'?'done':'none';
    exState[key]=next;
    W[`${P}_renderEx`](si,ei,next);
    W[`${P}_updateProgBar`](si);
    if(next==='active') W[`${P}_toast`]('Egzersiz başlatıldı!');
  };

  W[`${P}_finishEx`]=function(si,ei){
    exState[`${si}-${ei}`]='done';
    W[`${P}_renderEx`](si,ei,'done');
    W[`${P}_updateProgBar`](si);
    W[`${P}_toast`]('Tamamlandı!');
  };

  W[`${P}_renderEx`]=function(si,ei,state){
    const row=document.getElementById(`${P}-ex-${si}-${ei}`);
    if(!row) return;
    const circle=row.querySelector('div');
    const label=row.querySelectorAll('div')[1]?.querySelector('div');
    const sub=row.querySelectorAll('div')[1]?.querySelectorAll('div')[1];
    const btn=row.querySelector('button');
    if(btn) btn.remove();
    if(state==='done'){
      circle.style.background='var(--w)'; circle.style.border='none';
      circle.innerHTML=`<i class="ti ti-check" style="font-size:13px;color:var(--black);"></i>`;
      if(label){label.style.color='var(--g3)';label.style.textDecoration='line-through';label.style.fontWeight='500';}
    } else if(state==='active'){
      circle.style.background='var(--s3)'; circle.style.border='2px solid var(--w)';
      circle.innerHTML=`<i class="ti ti-player-play" style="font-size:11px;color:var(--w);"></i>`;
      if(label){label.style.color='var(--w)';label.style.textDecoration='none';label.style.fontWeight='700';}
      const btn2=document.createElement('button');
      btn2.textContent='Bitirdim';
      btn2.style.cssText='background:var(--w);border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--black);cursor:pointer;font-family:inherit;flex-shrink:0;';
      btn2.onclick=(e)=>{e.stopPropagation();W[`${P}_finishEx`](si,ei);};
      row.appendChild(btn2);
    } else {
      circle.style.background='var(--s3)'; circle.style.border='1px solid var(--b2)';
      circle.innerHTML='';
      if(label){label.style.color='var(--g1)';label.style.textDecoration='none';label.style.fontWeight='500';}
    }
  };

  W[`${P}_updateProgBar`]=function(si){
    const keys=Object.keys(exState).filter(k=>k.startsWith(`${si}-`));
    const done=keys.filter(k=>exState[k]==='done').length;
    const total=si===0?6:4;
    const pct=Math.round(done/total*100);
    const bar=document.getElementById(`${P}-prog-bar-${si}`);
    const txt=document.getElementById(`${P}-prog-txt-${si}`);
    if(bar) bar.style.width=pct+'%';
    if(txt) txt.textContent=`${done}/${total}`;
    if(done===total) W[`${P}_toast`]('Antrenman tamamlandı! 💪');
  };

  W[`${P}_clTab`]=function(tab){
    const isGroup=tab==='group';
    document.getElementById(`${P}-cl-tab-group`).style.color=isGroup?'var(--w)':'var(--g3)';
    document.getElementById(`${P}-cl-tab-group`).style.borderBottomColor=isGroup?'var(--w)':'transparent';
    document.getElementById(`${P}-cl-tab-solo`).style.color=!isGroup?'var(--w)':'var(--g3)';
    document.getElementById(`${P}-cl-tab-solo`).style.borderBottomColor=!isGroup?'var(--w)':'transparent';
    document.getElementById(`${P}-cl-group`).style.display=isGroup?'flex':'none';
    document.getElementById(`${P}-cl-group`).style.flexDirection=isGroup?'column':'';
    document.getElementById(`${P}-cl-solo`).style.display=!isGroup?'flex':'none';
  };

  W[`${P}_tdTab`]=function(tab){
    const isReady=tab==='ready';
    document.getElementById(`${P}-td-tab-ready`).style.color=isReady?'var(--w)':'var(--g3)';
    document.getElementById(`${P}-td-tab-ready`).style.borderBottomColor=isReady?'var(--w)':'transparent';
    document.getElementById(`${P}-td-tab-custom`).style.color=!isReady?'var(--w)':'var(--g3)';
    document.getElementById(`${P}-td-tab-custom`).style.borderBottomColor=!isReady?'var(--w)':'transparent';
    document.getElementById(`${P}-td-ready`).style.display=isReady?'block':'none';
    document.getElementById(`${P}-td-custom`).style.display=!isReady?'block':'none';
  };

  W[`${P}_mdTab`]=function(tab){
    const isDay=tab==='day';
    document.getElementById(`${P}-md-tab-day`).style.color=isDay?'var(--w)':'var(--g3)';
    document.getElementById(`${P}-md-tab-day`).style.borderBottomColor=isDay?'var(--w)':'transparent';
    document.getElementById(`${P}-md-tab-week`).style.color=!isDay?'var(--w)':'var(--g3)';
    document.getElementById(`${P}-md-tab-week`).style.borderBottomColor=!isDay?'var(--w)':'transparent';
    document.getElementById(`${P}-md-day`).style.display=isDay?'block':'none';
    document.getElementById(`${P}-md-week`).style.display=!isDay?'block':'none';
  };

  W[`${P}_aiPhoto`]=function(){
    const result=document.getElementById(`${P}-ai-result`);
    result.style.display='block';
    result.innerHTML=`<div style="display:flex;align-items:center;gap:8px;padding:16px;">
      <i class="ti ti-loader-2" style="font-size:20px;color:var(--g2);animation:spin 1s linear infinite;"></i>
      <div style="font-size:13px;color:var(--g2);">Yapay zeka analiz ediyor...</div>
    </div>`;
    setTimeout(()=>{
      result.innerHTML=`<div class="cp">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <i class="ti ti-sparkles" style="font-size:16px;color:var(--w);"></i>
          <div style="font-size:13px;font-weight:700;color:var(--w);">Yapay Zeka Analizi</div>
        </div>
        <div style="font-size:12px;color:var(--g1);line-height:1.7;margin-bottom:12px;">Fotoğrafta <b style="color:var(--w);">makarna bolonez</b> tespit edildi. Tahmini besin değerleri:</div>
        <div style="display:flex;gap:7px;margin-bottom:12px;">
          <div style="flex:1;background:var(--s3);border-radius:9px;padding:9px;text-align:center;"><div style="font-size:15px;font-weight:700;color:var(--w);">480</div><div style="font-size:9px;color:var(--g3);">kcal</div></div>
          <div style="flex:1;background:var(--s3);border-radius:9px;padding:9px;text-align:center;"><div style="font-size:15px;font-weight:700;color:var(--w);">22g</div><div style="font-size:9px;color:var(--g3);">protein</div></div>
          <div style="flex:1;background:var(--s3);border-radius:9px;padding:9px;text-align:center;"><div style="font-size:15px;font-weight:700;color:var(--w);">58g</div><div style="font-size:9px;color:var(--g3);">karb</div></div>
          <div style="flex:1;background:var(--s3);border-radius:9px;padding:9px;text-align:center;"><div style="font-size:15px;font-weight:700;color:var(--w);">14g</div><div style="font-size:9px;color:var(--g3);">yağ</div></div>
        </div>
        <div style="font-size:11px;color:var(--amber);margin-bottom:10px;"><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;"></i> Tahmini değerdir, porsiyon boyutuna göre değişebilir.</div>
        <div style="display:flex;gap:7px;">
          <button style="flex:1;background:var(--w);border:none;border-radius:9px;padding:9px;font-size:12px;font-weight:700;color:var(--black);cursor:pointer;font-family:inherit;" onclick="document.getElementById('${P}-ai-result').style.display='none';W['${P}_toast']('Öğüne eklendi!')">Öğüne Ekle</button>
          <button style="flex:1;background:var(--s3);border:1px solid var(--b2);border-radius:9px;padding:9px;font-size:12px;font-weight:600;color:var(--g1);cursor:pointer;font-family:inherit;" onclick="document.getElementById('${P}-ai-result').style.display='none'">İptal</button>
        </div>
      </div>`;
    },2000);
  };
}

function selDate(el){
  el.closest('.ds').querySelectorAll('.dp').forEach(d=>d.classList.remove('on'));
  el.classList.add('on');
}

const W={};
build('I',true);
build('A',false);

let activeRole='admin';
function setRole(r){
  activeRole=r;
  document.querySelectorAll('.rb').forEach(b=>b.classList.remove('on'));
  document.getElementById(`rb-${r}`).classList.add('on');
  // sync login panel
  ['I','A'].forEach(P=>{
    W[`${P}_selrole`]&&W[`${P}_selrole`](r);
  });
}

// init
setRole('admin');
</script>
</body>
